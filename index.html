<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>语法填空训练系统@新疆学生无限进步</title>
    <link rel="stylesheet" href="./styles.css?v=tense-cue-3" />
  </head>
  <body class="auth-locked">
    <section class="login-gate" id="loginGate" aria-label="登录入口">
      <div class="login-card">
        <div class="brand-mark" aria-hidden="true">G</div>
        <h1>语法填空训练系统@新疆学生无限进步</h1>
        <p>请输入 6 位登录码进入训练系统</p>
        <form id="loginForm" autocomplete="off" action="javascript:void(0)">
          <label for="loginCode">登录码</label>
          <input id="loginCode" name="loginCode" type="text" maxlength="6" inputmode="text" placeholder="例如 A1B2C3" />
          <button class="primary-btn" type="submit">进入系统</button>
          <div class="login-error" id="loginError" role="alert"></div>
        </form>
      </div>
    </section>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand"><div class="brand-mark" aria-hidden="true">G</div><div><strong>语法填空训练系统@新疆学生无限进步</strong><span>中考专项训练</span></div></div>
        <nav class="nav" aria-label="主功能导航">
          <button class="nav-item active" data-view="map">考点闯关</button>
          <button class="nav-item" data-view="exam">真题测试</button>
          <button class="nav-item" data-view="review">错题复盘</button>
        </nav>
      </aside>
      <main class="workspace">
        <header class="topbar"><div><p class="eyebrow">clue based grammar practice</p><h1>把语法填空变成“找线索、拆陷阱、做复盘”</h1></div></header>
        <section class="view active" id="view-map" aria-labelledby="mapTitle">
          <div class="section-head"><div><h2 id="mapTitle">核心考点闯关区</h2><p>点击导图节点查看考察点、线索和易错点；真题测试中的每一步都能对应回这里。</p></div><button class="ghost-btn" id="resetDrill">重置本题</button></div>
          <div class="map-layout"><div class="mind-map" id="mindMap" aria-label="给词填空考点一览表"></div><article class="drill-panel"><div class="level-title"><span id="activeBadge">动词语态</span><h3 id="drillTitle">动词语态排雷</h3></div><div class="sentence-box" id="sentenceBox"></div><div class="hint-strip" id="hintStrip">点击左侧考点，右侧显示讲解。</div><div class="options-grid" id="optionsGrid"></div><div class="explain-box" id="explainBox">这里保留讲解，不做题。</div></article></div>
        </section>
        <section class="view" id="view-exam" aria-labelledby="examTitle"><div class="section-head"><div><h2 id="examTitle">真题练习篇目</h2><p>先选择篇目，再进入分步做题。点击原文空格，右侧显示判断链和选项。</p></div></div><article class="exam-card"><div class="exam-meta"><button class="primary-btn" id="submitExam">提交试卷</button></div><div id="examList"></div><div class="exam-feedback" id="examFeedback"></div></article></section>
        <section class="view" id="view-review" aria-labelledby="reviewTitle"><div class="section-head"><div><h2 id="reviewTitle">错题复盘</h2><p>这里只保留做错的题目。</p></div></div><div class="review-grid single"><article class="mistake-book"><h3>错题本</h3><div id="mistakeList"></div></article></div></section>
      </main>
    </div>
    <script src="./app.js?v=tense-cue-4"></script>
    <script src="./extra-articles.js?v=tense-cue-4"></script>
  </body>
</html>
